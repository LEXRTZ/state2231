<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <input type="text" placeholder="Search..." id="search-input" onkeydown="if(event.ctrlKey && event.key === 'k') { event.preventDefault(); document.getElementById('search-input').focus(); }">
        </nav>
        <div class="breadcrumb">
            <a href="#">Home</a> > <a href="#">Section</a>
        </div>
    </header>

    <main>
        <section class="content">
            <div class="box box-style">
                <h2>Title</h2>
                <p>This is the content area with guideline boxes.</p>
            </div>
            <div class="language-buttons horizontal-scroll">
                <button>English</button>
                <button>Spanish</button>
                <button>French</button>
                <!-- Add more languages as needed -->
            </div>
        </section>
    </main>

    <footer>
        <button class="copy-link-button" onclick="copyToClipboard()">Copy Link</button>
    </footer>

    <script>
        function copyToClipboard() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied to clipboard!');
            });
        }
    </script>
</body>
</html>
